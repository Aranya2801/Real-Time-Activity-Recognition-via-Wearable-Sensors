<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="green_blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="pulse_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" rx="12"/>

  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#94a3b8"/>
    </pattern>
    <rect width="1200" height="280" fill="url(#dots)" rx="12"/>
  </g>

  <!-- ECG/Signal wave across full width -->
  <g filter="url(#glow)" opacity="0.35">
    <polyline points="0,200 80,200 100,200 115,160 125,220 135,120 145,240 155,200 200,200 220,200 235,170 245,215 255,145 265,235 275,200 320,200 340,200 355,165 365,218 375,140 385,238 395,200 440,200 460,200 475,168 485,216 495,142 505,236 515,200 560,200 580,200 595,166 605,217 615,143 625,237 635,200 680,200 700,200 715,169 725,215 735,141 745,237 755,200 800,200 820,200 835,167 845,216 855,144 865,236 875,200 920,200 940,200 955,168 965,215 975,142 985,236 995,200 1040,200 1060,200 1075,169 1085,215 1095,143 1105,237 1115,200 1200,200"
      fill="none" stroke="url(#green_blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Strong center ECG highlight -->
  <g filter="url(#glow_strong)">
    <polyline points="500,200 530,200 545,155 560,225 575,105 590,245 605,200 640,200"
      fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(80,95)">
    <!-- Outer ring -->
    <circle cx="45" cy="45" r="42" fill="none" stroke="url(#green_blue)" stroke-width="2.5" opacity="0.7"/>
    <!-- Inner glow circle -->
    <circle cx="45" cy="45" r="35" fill="#22c55e" opacity="0.08"/>
    <!-- Brain/Activity icon simplified -->
    <g fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
      <!-- Activity zigzag -->
      <polyline points="18,45 28,45 33,30 38,58 43,25 48,62 53,38 58,45 72,45"/>
      <!-- Neural dot -->
      <circle cx="45" cy="45" r="3" fill="#22c55e" stroke="none"/>
    </g>
    <!-- Corner accents -->
    <line x1="10" y1="10" x2="20" y2="10" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="10" y1="10" x2="10" y2="20" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="80" y1="80" x2="70" y2="80" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="80" y1="80" x2="80" y2="70" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="195" y="125" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#green_blue)" filter="url(#glow)">NeuroMotion</text>
  <text x="197" y="163" font-family="'Segoe UI', system-ui, sans-serif" font-size="23" font-weight="400" fill="#94a3b8" letter-spacing="8">HAR</text>

  <!-- Tagline -->
  <text x="195" y="195" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="300" fill="#64748b" letter-spacing="1">Real-Time Human Activity Recognition via Wearable Sensors</text>

  <!-- Badges row -->
  <g transform="translate(195,215)">
    <!-- Badge 1: PyTorch -->
    <rect x="0" y="0" width="78" height="22" rx="11" fill="#22c55e" opacity="0.15"/>
    <rect x="0" y="0" width="78" height="22" rx="11" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <text x="39" y="15" font-family="sans-serif" font-size="10" fill="#22c55e" text-anchor="middle" font-weight="600">PyTorch 2.2</text>
    <!-- Badge 2: 98.2% -->
    <rect x="86" y="0" width="72" height="22" rx="11" fill="#3b82f6" opacity="0.15"/>
    <rect x="86" y="0" width="72" height="22" rx="11" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <text x="122" y="15" font-family="sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle" font-weight="600">98.2% Acc</text>
    <!-- Badge 3: Edge AI -->
    <rect x="166" y="0" width="66" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
    <rect x="166" y="0" width="66" height="22" rx="11" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <text x="199" y="15" font-family="sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="600">Edge AI</text>
    <!-- Badge 4: MIT -->
    <rect x="240" y="0" width="54" height="22" rx="11" fill="#f59e0b" opacity="0.15"/>
    <rect x="240" y="0" width="54" height="22" rx="11" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <text x="267" y="15" font-family="sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="600">MIT</text>
    <!-- Badge 5: Open Source -->
    <rect x="302" y="0" width="86" height="22" rx="11" fill="#ef4444" opacity="0.15"/>
    <rect x="302" y="0" width="86" height="22" rx="11" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="345" y="15" font-family="sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="600">Open Source</text>
  </g>

  <!-- Right side stats panel -->
  <g transform="translate(870,60)">
    <rect width="260" height="160" rx="10" fill="#1e293b" opacity="0.7"/>
    <rect width="260" height="160" rx="10" fill="none" stroke="#334155" stroke-width="1"/>

    <!-- Stats -->
    <text x="20" y="30" font-family="sans-serif" font-size="11" fill="#64748b" font-weight="500">BENCHMARK RESULTS</text>
    <line x1="20" y1="38" x2="240" y2="38" stroke="#334155" stroke-width="1"/>

    <text x="20" y="62" font-family="sans-serif" font-size="13" fill="#94a3b8">UCI HAR Accuracy</text>
    <text x="240" y="62" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="700" text-anchor="end">98.2%</text>

    <text x="20" y="88" font-family="sans-serif" font-size="13" fill="#94a3b8">F1 Score (macro)</text>
    <text x="240" y="88" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="700" text-anchor="end">0.981</text>

    <text x="20" y="114" font-family="sans-serif" font-size="13" fill="#94a3b8">Inference Latency</text>
    <text x="240" y="114" font-family="sans-serif" font-size="14" fill="#3b82f6" font-weight="700" text-anchor="end">11ms</text>

    <text x="20" y="140" font-family="sans-serif" font-size="13" fill="#94a3b8">Model (PatchTST INT8)</text>
    <text x="240" y="140" font-family="sans-serif" font-size="14" fill="#f59e0b" font-weight="700" text-anchor="end">3.4MB</text>

    <!-- Live indicator -->
    <circle cx="20" cy="155" r="4" fill="#22c55e" opacity="0.9"/>
    <text x="30" y="159" font-family="sans-serif" font-size="10" fill="#22c55e">LIVE · 50Hz streaming</text>
  </g>

  <!-- Bottom border gradient -->
  <rect x="0" y="272" width="1200" height="8" rx="0 0 12 12" fill="url(#green_blue)" opacity="0.7"/>
</svg>
